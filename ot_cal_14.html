<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OT Builder Pro | พร้อมระบบบันทึกข้อมูล</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #161920;
            --surface2: #1e2028;
            --surface3: #252830;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --text: #eef0f6;
            --text2: #9399a8;
            --text3: #5a6072;
            --accent: #f0c040;
            --accent2: #f8d878;
            --accent-dim: rgba(240,192,64,0.12);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96,165,250,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.1);
            --radius: 14px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'DM Sans', 'Noto Sans Thai', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 60px;
        }

        /* HEADER */
        .header-wrap {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(20px);
            display: flex; align-items: center; gap: 16px;
        }

        .logo-mark {
            width: 40px; height: 40px; background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        .grand-total-badge {
            background: var(--accent-dim); border: 1px solid rgba(240,192,64,0.25);
            border-radius: 10px; padding: 8px 16px; margin-left: auto;
        }
        .grand-total-badge .label { font-size: 0.7rem; color: var(--accent2); font-weight: 600; text-transform: uppercase; }
        .grand-total-badge .value { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: var(--accent); }

        .main { max-width: 1060px; margin: 0 auto; padding: 32px 24px; }

        /* SALARY CARD */
        .salary-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; margin-bottom: 24px; display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: center;
        }
        @media(max-width:640px){ .salary-card { grid-template-columns: 1fr; } }

        .salary-input-wrap { position: relative; }
        .salary-input-wrap .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-weight: 600; }
        .salary-input-wrap input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm);
            color: var(--text); font-size: 1.3rem; font-family: 'DM Mono', monospace; padding: 12px 14px 12px 32px; outline: none;
        }

        .rate-pills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .rate-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
        .rate-pill .rp-label { font-size: 0.65rem; color: var(--text3); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .rate-pill .rp-val { font-family: 'DM Mono', monospace; font-size: 0.95rem; color: var(--text); }

        /* ITEMS */
        .section-label { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; color: var(--text3); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        #items-container { display: flex; flex-direction: column; gap: 10px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .item.active { border-color: rgba(240,192,64,0.3); }

        .item-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; }
        .drag-handle { color: var(--text3); cursor: grab; padding: 0 4px; }
        .item-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
        .item-amount { font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; }

        .item-body { display: none; padding: 18px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }
        .item.active .item-body { display: block; }

        .field-row { display: grid; gap: 12px; margin-bottom: 12px; }
        .col-3 { grid-template-columns: 1fr 1fr 1fr; }
        .col-2 { grid-template-columns: 1fr 2fr; }
        @media(max-width:580px){ .col-3, .col-2 { grid-template-columns: 1fr; } }

        .field label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
        .field input, .field select {
            width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm);
            color: var(--text); font-size: 0.9rem; padding: 10px; outline: none;
        }

        .btn-add {
            width: 100%; background: transparent; border: 1.5px dashed rgba(240,192,64,0.3); border-radius: var(--radius);
            color: var(--accent); font-weight: 600; padding: 14px; cursor: pointer; margin: 16px 0 28px;
        }
        .btn-del { background: transparent; border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

        /* TABLE */
        .results-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 0.85rem; }
        th { padding: 12px 16px; text-align: left; background: var(--surface2); color: var(--text3); font-size: 0.68rem; text-transform: uppercase; }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        
        .badge { padding: 3px 8px; border-radius: 5px; font-size: 0.65rem; font-weight: 700; }
        .badge-wd { background: var(--green-dim); color: var(--green); }
        .badge-hd { background: var(--accent-dim); color: var(--accent); }
        .hours-chip { font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); margin-right: 4px; }
        .hours-chip.x1 { color: var(--blue); }
        .hours-chip.x15 { color: var(--green); }
        .hours-chip.x3 { color: var(--accent); }
    </style>
</head>
<body>

<div class="header-wrap">
    <div class="logo-mark">⏱</div>
    <div class="header-text">
        <h1 style="font-size:1.1rem; font-weight:700;">OT Builder Pro</h1>
        <p style="font-size:0.75rem; color:var(--text3);">คำนวณโอทีอัจฉริยะ (บันทึกข้อมูลอัตโนมัติ)</p>
    </div>
    <div class="grand-total-badge">
        <div class="label">โอทีรวมทั้งหมด</div>
        <div class="value" id="headerTotal">฿0.00</div>
    </div>
</div>

<div class="main">
    <div class="salary-card">
        <div class="field">
            <label>เงินเดือนพื้นฐาน</label>
            <div class="salary-input-wrap">
                <span class="prefix">฿</span>
                <input id="salary" type="number" value="20380">
            </div>
        </div>
        <div class="rate-pills">
            <div class="rate-pill"><div class="rp-label">รายวัน</div><div class="rp-val" id="sumDaily">0</div></div>
            <div class="rate-pill"><div class="rp-label">1.0x</div><div class="rp-val" id="sum1">0</div></div>
            <div class="rate-pill"><div class="rp-label">1.5x</div><div class="rp-val" id="sum15">0</div></div>
            <div class="rate-pill"><div class="rp-label">3.0x</div><div class="rp-val" id="sum3">0</div></div>
        </div>
    </div>

    <div class="section-label">รายการโอที</div>
    <div id="items-container"></div>
    <button class="btn-add" onclick="addItem()">+ เพิ่มรายการโอทีใหม่</button>

    <div class="section-label">สรุปตารางรับเงิน</div>
    <div class="results-card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>รายการ</th>
                        <th style="text-align:center">ช่วงเวลา</th>
                        <th>รายละเอียด (ชม. x เรท = เงิน)</th>
                        <th style="text-align:center">จำนวนวัน</th>
                        <th style="text-align:right">รวมเงิน</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'OT_PRO_DATA';

    const toHour = t => { if (!t) return 0; const [h, m] = t.split(":").map(Number); return h + m / 60; };
    const fm = n => n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fh = n => (n % 1 === 0 ? n : +n.toFixed(2));

    // --- ระบบ Memory (Storage) ---
    function saveToMemory() {
        const data = {
            salary: document.getElementById('salary').value,
            items: Array.from(document.querySelectorAll('.item')).map(el => ({
                id: el.dataset.id,
                type: el.querySelector('.type').value,
                start: el.querySelector('.start').value,
                end: el.querySelector('.end').value,
                days: el.querySelector('.days').value,
                name: el.querySelector('.name').value,
                edited: el.querySelector('.name').dataset.edited
            }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadFromMemory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('salary').value = data.salary;
            data.items.forEach(item => addItem(item));
        } else {
            addItem();
        }
        calculate();
    }

    function addItem(saved = null) {
        document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
        const id = saved ? saved.id : Date.now();
        const html = `
        <div class="item active" data-id="${id}">
            <div class="item-header" onclick="this.closest('.item').classList.toggle('active')">
                <span class="drag-handle">⠿</span>
                <span class="item-name">${saved?.name || 'รายการใหม่'}</span>
                <span class="item-amount">฿0.00</span>
            </div>
            <div class="item-body">
                <div class="field-row col-3">
                    <div class="field"><label>ประเภทวัน</label>
                        <select class="type">
                            <option value="weekday" ${saved?.type==='weekday'?'selected':''}>วันธรรมดา (1.5x)</option>
                            <option value="holiday" ${saved?.type==='holiday'?'selected':''}>วันหยุด (1x/3x)</option>
                        </select>
                    </div>
                    <div class="field"><label>เริ่ม</label><input class="start" value="${saved?.start || ''}"></div>
                    <div class="field"><label>สิ้นสุด</label><input class="end" value="${saved?.end || ''}"></div>
                </div>
                <div class="field-row col-2">
                    <div class="field"><label>จำนวนวัน</label><input type="number" class="days" value="${saved?.days || 1}"></div>
                    <div class="field"><label>ชื่อรายการ</label><input class="name" value="${saved?.name || ''}" data-edited="${saved?.edited || ''}"></div>
                </div>
                <button class="btn-del" onclick="this.closest('.item').remove(); calculate()">ลบรายการนี้</button>
            </div>
        </div>`;

        document.getElementById("items-container").insertAdjacentHTML("beforeend", html);
        const el = document.querySelector(`[data-id="${id}"]`);

        const startInp = el.querySelector(".start");
        const endInp = el.querySelector(".end");
        
        flatpickr(startInp, { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, onChange: calculate });
        flatpickr(endInp, { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, onChange: calculate });

        el.querySelector(".type").onchange = calculate;
        el.querySelector(".days").oninput = calculate;
        el.querySelector(".name").oninput = (e) => {
            e.target.dataset.edited = "1";
            el.querySelector(".item-name").innerText = e.target.value || "รายการใหม่";
            calculate();
        };

        if(!saved) calculate();
    }

    function calculate() {
        const salary = +document.getElementById("salary").value || 0;
        const hourly = salary / 30 / 8;
        const daily = hourly * 8;

        document.getElementById("sumDaily").innerText = fm(daily);
        document.getElementById("sum1").innerText = fm(hourly);
        document.getElementById("sum15").innerText = fm(hourly * 1.5);
        document.getElementById("sum3").innerText = fm(hourly * 3);

        let rows = "";
        let grandTotal = 0;

        document.querySelectorAll('.item').forEach(el => {
            const type = el.querySelector(".type").value;
            const startVal = el.querySelector(".start").value;
            const endVal = el.querySelector(".end").value;
            const days = +el.querySelector(".days").value || 0;
            const name = el.querySelector(".name").value || "รายการไม่มีชื่อ";

            let s = toHour(startVal);
            let e = toHour(endVal);
            if (e <= s && s > 0) e += 24;

            let h1=0, h15=0, h3=0;
            for (let h=s; h<e; h+=0.5) {
                let x = h >= 24 ? h-24 : h;
                if (type === "weekday") {
                    if (x >= 8.5 && x < 17.5) continue;
                    h15 += 0.5;
                } else {
                    if (x >= 8.5 && x < 17.5) {
                        if (x >= 12 && x < 13) continue;
                        h1 += 0.5;
                    } else { h3 += 0.5; }
                }
            }

            const total = ((h1*hourly) + (h15*hourly*1.5) + (h3*hourly*3)) * days;
            grandTotal += total;
            el.querySelector(".item-amount").innerText = `฿${fm(total)}`;

            const c1 = h1 > 0 ? `<div class="hours-chip x1">1.0x · ${fh(h1)}ชม. · ฿${fm(h1*hourly)}</div>` : '';
            const c15 = h15 > 0 ? `<div class="hours-chip x15">1.5x · ${fh(h15)}ชม. · ฿${fm(h15*hourly*1.5)}</div>` : '';
            const c3 = h3 > 0 ? `<div class="hours-chip x3">3.0x · ${fh(h3)}ชม. · ฿${fm(h3*hourly*3)}</div>` : '';

            rows += `
                <tr>
                    <td><span class="badge ${type==='weekday'?'badge-wd':'badge-hd'}">${type==='weekday'?'WD':'HD'}</span> <b>${name}</b></td>
                    <td style="text-align:center; font-family:'DM Mono'">${startVal || '—'}-${endVal || '—'}</td>
                    <td>${c1}${c15}${c3}</td>
                    <td style="text-align:center">${days}</td>
                    <td style="text-align:right; font-weight:700; color:var(--accent)">฿${fm(total)}</td>
                </tr>
            `;
        });

        document.getElementById("table-body").innerHTML = rows || '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text3)">ยังไม่มีรายการข้อมูล</td></tr>';
        document.getElementById("headerTotal").innerText = `฿${fm(grandTotal)}`;
        saveToMemory();
    }

    new Sortable(document.getElementById("items-container"), { handle: '.drag-handle', animation: 150, onEnd: calculate });
    document.getElementById("salary").oninput = calculate;
    
    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = loadFromMemory;
</script>
</body>
</html>
