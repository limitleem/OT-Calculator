<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OT Builder Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
:root { --primary:#6366f1; }

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;padding:16px;
}

.container{max-width:1000px;margin:auto;}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* summary */
.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}
.summary div{
  background:#f3f4f6;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:13px;
}

/* inputs */
input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;margin-bottom:10px;
}

.row{display:flex;gap:10px;}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;border:none;
  border-radius:12px;
}

/* badge */
.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
}
.weekday{background:#dcfce7;color:#166534;}
.holiday{background:#ede9fe;color:#5b21b6;}
.hour{background:#e0e7ff;color:#3730a3;}

.info{font-size:13px;color:#555;}

/* collapse */
.content{display:none;}
.item.active .content{display:block;}

.title{
  font-weight:bold;
  cursor:pointer;
}

/* table */
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;text-align:center;}
th{background:#f3f4f6;}
tr:nth-child(even){background:#fafafa;}
.total{background:#eef2ff;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <label>เงินเดือน</label>
  <input id="salary" value="20380">

  <div class="summary">
    <div>ค่าแรง/วัน<br><b id="sumDaily"></b></div>
    <div>1x/ชม<br><b id="sum1"></b></div>
    <div>1.5x/ชม<br><b id="sum15"></b></div>
    <div>3x/ชม<br><b id="sum3"></b></div>
  </div>
</div>

<div id="items"></div>

<button onclick="addItem()">+ เพิ่มโอที</button>

<div class="card" id="result"></div>

</div>

<script>

const toHour=t=>{
  if(!t) return 0;
  const [h,m]=t.split(":").map(Number);
  return h+m/60;
};

const fm=n=>!n?"":n.toLocaleString(undefined,{maximumFractionDigits:2});
const fh=n=>!n?"":(n%1===0?n:n.toFixed(2));

// collapse helper
function collapseAll(){
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
}

function addItem(){
  collapseAll();

  const id=Date.now();

  const html=`
  <div class="card item active" data-id="${id}">
    <div class="title">OT ใหม่</div>

    <div class="content">

      <label>ประเภท</label>
      <select class="type">
        <option value="weekday">วันธรรมดา</option>
        <option value="holiday">วันหยุด</option>
      </select>

      <label>จำนวนวัน</label>
      <input class="days" type="number" value="1">

      <label>เวลา</label>
      <div class="row">
        <input class="start">
        <input class="end">
      </div>

      <div class="info"></div>

      <label>ชื่อรายการ</label>
      <input class="name">

      <button onclick="this.closest('.item').remove(); calculate()" style="background:#ef4444;">ลบ</button>

    </div>
  </div>
  `;

  items.insertAdjacentHTML("beforeend",html);

  const el=document.querySelector(`[data-id="${id}"]`);

  el.querySelector(".title").onclick=()=>{
    el.classList.toggle("active");
  };

  const type=el.querySelector(".type");
  const start=el.querySelector(".start");
  const end=el.querySelector(".end");
  const info=el.querySelector(".info");
  const name=el.querySelector(".name");
  const days=el.querySelector(".days");

  const fp1=flatpickr(start,{enableTime:true,noCalendar:true,dateFormat:"H:i"});
  const fp2=flatpickr(end,{enableTime:true,noCalendar:true,dateFormat:"H:i"});

  function update(){
    let s=toHour(start.value);
    let e=toHour(end.value);

    let total=0,cut=0;

    for(let h=s;h<e;h+=0.5){
      let x=h>=24?h-24:h;

      if(type.value==="weekday"){
        // ❗ exclude 8.30-16.30
        if(x>=8.5 && x<16.5) continue;
        total+=0.5;
      }
      else{
        if(x>=8.5&&x<16.5){
          if(x>=12&&x<13){cut+=0.5;continue;}
        }
        total+=0.5;
      }
    }

    info.innerText = cut>0
      ? `รวม ${fh(total)} ชม. (พัก ${fh(cut)} ชม.)`
      : `รวม ${fh(total)} ชม.`;

    if(!name.dataset.edited){
      name.value=`OT ${type.value==="weekday"?"วันธรรมดา":"วันหยุด"} ${start.value}-${end.value}`;
    }

    el.querySelector(".title").innerText=name.value;

    calculate();
  }

  name.oninput=()=>{
    name.dataset.edited=true;
    el.querySelector(".title").innerText=name.value;
  };

  type.onchange=()=>{
    if(type.value==="weekday"){
      fp1.setDate("17:00");
      fp2.setDate("21:00");
    }else{
      fp1.setDate("08:30");
      fp2.setDate("21:00");
    }
    update();
  };

  start.onchange=update;
  end.onchange=update;
  days.oninput=calculate;

  type.dispatchEvent(new Event("change"));
}

// drag
new Sortable(items,{animation:150,onEnd:calculate});

// calculate
function calculate(){
  const salary=+salaryEl.value||0;
  const hourly=salary/30/7;
  const daily=hourly*7;

  sumDaily.innerText=fm(daily);
  sum1.innerText=fm(hourly);
  sum15.innerText=fm(hourly*1.5);
  sum3.innerText=fm(hourly*3);

  let rows="",grand=0;

  document.querySelectorAll(".item").forEach(item=>{

    const type=item.querySelector(".type").value;
    const name=item.querySelector(".name").value;
    const days=+item.querySelector(".days").value||0;

    const s=toHour(item.querySelector(".start").value);
    const e=toHour(item.querySelector(".end").value);

    let h1=0,h15=0,h3=0;

    for(let h=s;h<e;h+=0.5){
      let x=h>=24?h-24:h;

      if(type==="weekday"){
        if(x>=8.5 && x<16.5) continue;
        h15+=0.5;
      }else{
        if(x>=8.5&&x<16.5){
          if(x>=12&&x<13) continue;
          h1+=0.5;
        } else {
          h3+=0.5;
        }
      }
    }

    const dayTotal=(h1*hourly)+(h15*hourly*1.5)+(h3*hourly*3);
    const total=dayTotal*days;
    grand+=total;

    const badgeClass=type==="weekday"?"weekday":"holiday";

    rows+=`
    <tr>
      <td><span class="badge ${badgeClass}">${name}</span></td>
      <td>${item.querySelector(".start").value}-${item.querySelector(".end").value}</td>

      <td><span class="badge hour">${fh(h1)} ชม.</span></td>
      <td>${fm(h1*hourly)}</td>

      <td><span class="badge hour">${fh(h15)} ชม.</span></td>
      <td>${fm(h15*hourly*1.5)}</td>

      <td><span class="badge hour">${fh(h3)} ชม.</span></td>
      <td>${fm(h3*hourly*3)}</td>

      <td>${fm(dayTotal)}</td>
      <td>${days||""}</td>
      <td>${fm(total)}</td>
    </tr>
    `;
  });

  result.innerHTML=`
  <table>
    <tr>
      <th>รายการ</th>
      <th>เวลา</th>
      <th colspan="2">1x</th>
      <th colspan="2">1.5x</th>
      <th colspan="2">3x</th>
      <th>รวม/วัน</th>
      <th>วัน</th>
      <th>รวมเงิน</th>
    </tr>
    ${rows}
    <tr class="total">
      <td colspan="10">รวมทั้งหมด</td>
      <td>${fm(grand)}</td>
    </tr>
  </table>
  `;
}

// fix ref
const salaryEl=document.getElementById("salary");
salaryEl.oninput=calculate;

// init
addItem();

</script>

</body>
</html>
