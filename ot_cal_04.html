<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OT Builder Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
:root { --primary:#6366f1; }

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;padding:16px;
}

.container{max-width:1000px;margin:auto;}

.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:18px;border-radius:16px;
  margin-bottom:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.header{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* inputs */
input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;margin-bottom:10px;
}

.row{display:flex;gap:10px;}

/* button */
button{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;border:none;
  border-radius:12px;
}

/* badge */
.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}
.weekday{background:#dcfce7;color:#166534;}
.holiday{background:#ede9fe;color:#5b21b6;}
.custom{background:#e5e7eb;color:#333;}

/* drag */
.drag{font-size:12px;color:#888;cursor:grab;}

/* table */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
}

th{
  background:#f3f4f6;
  padding:10px;
}

td{
  padding:10px;
  text-align:center;
}

tr:nth-child(even) td{background:#fafafa;}
tr:hover td{background:#eef2ff;}

.total{
  background:#eef2ff;
  font-weight:bold;
}

.highlight{
  color:#4f46e5;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card header">
  <h2>💰 OT Builder</h2>
</div>

<div class="card">
  <label>เงินเดือน</label>
  <input id="salary" value="20380">
</div>

<button onclick="addItem()">+ เพิ่มโอที</button>

<div id="items"></div>

<button onclick="calculate()">คำนวณ</button>

<div class="card" id="result"></div>

</div>

<script>

const toHour=t=>{
  if(!t) return 0;
  const [h,m]=t.split(":").map(Number);
  return h+m/60;
};

const fm=n=>!n?"":n.toLocaleString(undefined,{maximumFractionDigits:2});
const fh=n=>!n?"":(n%1===0?n:n.toFixed(2));

function addItem(){
  const id=Date.now();

  const html=`
  <div class="card item" data-id="${id}">
    <div class="drag">☰ ลากเรียง</div>

    <label>ประเภท OT</label>
    <select class="type">
      <option value="weekday">วันธรรมดา</option>
      <option value="holiday">วันหยุด</option>
      <option value="custom">กำหนดเอง</option>
    </select>

    <label>ชื่อรายการ</label>
    <input class="name" placeholder="เช่น OT เย็น">

    <label>จำนวนวัน</label>
    <input class="days" type="number" value="1">

    <label>เวลา</label>
    <div class="row">
      <input class="start">
      <input class="end">
    </div>

    <button onclick="this.closest('.item').remove()" style="background:#ef4444;">ลบ</button>
  </div>
  `;

  items.insertAdjacentHTML("beforeend",html);

  const el=document.querySelector(`[data-id="${id}"]`);

  const start=el.querySelector(".start");
  const end=el.querySelector(".end");
  const type=el.querySelector(".type");

  const fp1=flatpickr(start,{enableTime:true,noCalendar:true,dateFormat:"H:i"});
  const fp2=flatpickr(end,{enableTime:true,noCalendar:true,dateFormat:"H:i"});

  type.onchange=()=>{
    if(type.value==="weekday"){
      fp1.setDate("17:00");
      fp2.setDate("21:00");
    }
    if(type.value==="holiday"){
      fp1.setDate("08:30");
      fp2.setDate("21:00");
    }
  };

  type.dispatchEvent(new Event("change"));
}

// drag
new Sortable(items,{animation:150,handle:".drag"});

// calculate
function calculate(){
  const salary=+document.getElementById("salary").value||0;
  const hourly=salary/30/7;

  let rows="",grand=0;

  document.querySelectorAll(".item").forEach(item=>{

    const type=item.querySelector(".type").value;
    const name=item.querySelector(".name").value||"-";
    const days=+item.querySelector(".days").value||0;

    const s=toHour(item.querySelector(".start").value);
    const e=toHour(item.querySelector(".end").value);

    let h1=0,h15=0,h3=0;

    for(let h=s;h<e;h+=0.5){
      let x=h>=24?h-24:h;

      if(type==="weekday"){
        h15+=0.5;
      }
      else if(type==="holiday"){
        if(x>=8.5&&x<16.5){
          if(x>=12&&x<13) continue;
          h1+=0.5;
        } else {
          h3+=0.5;
        }
      }
      else{
        h1+=0.5;
      }
    }

    const dayTotal = (h1*hourly)+(h15*hourly*1.5)+(h3*hourly*3);
    const total=dayTotal*days;
    grand+=total;

    const badge =
      type==="weekday" ? `<span class="badge weekday">วันธรรมดา</span>` :
      type==="holiday" ? `<span class="badge holiday">วันหยุด</span>` :
      `<span class="badge custom">กำหนดเอง</span>`;

    rows+=`
    <tr>
      <td>${badge}<br>${name}</td>
      <td>${item.querySelector(".start").value}-${item.querySelector(".end").value}</td>

      <td>${fh(h1)}</td><td>${fm(h1*hourly)}</td>
      <td>${fh(h15)}</td><td>${fm(h15*hourly*1.5)}</td>
      <td>${fh(h3)}</td><td>${fm(h3*hourly*3)}</td>

      <td class="highlight">${fm(dayTotal)}</td>
      <td>${days||""}</td>
      <td>${fm(total)}</td>
    </tr>
    `;
  });

  result.innerHTML=`
  <table>
    <tr>
      <th>รายการ</th>
      <th>เวลา</th>
      <th colspan="2">1x</th>
      <th colspan="2">1.5x</th>
      <th colspan="2">3x</th>
      <th>รวม/วัน</th>
      <th>วัน</th>
      <th>รวมเงิน</th>
    </tr>

    ${rows}

    <tr class="total">
      <td colspan="10">รวมทั้งหมด</td>
      <td>${fm(grand)}</td>
    </tr>
  </table>
  `;
}

// default
addItem();

</script>

</body>
</html>
